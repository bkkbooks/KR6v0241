body:
  text: 生居家眷屬侍佛時王仲為亡父弟阿歡像主王伏敬侍佛時像主王明侍佛時妻劉莫問侍佛時王綿侍時比丘尼靜果比丘尼靜義比丘尼迦葉比丘尼法容比丘尼法賢高惠大魏武定二年歲次甲子二月丙辰朔十六日辛未自感人心是思八人一佛二菩薩大通智勝有二太子有八天人二寶塔倒龍師子諸天花琰夫睿軌沖玄非至真無以體其元寂談玄廓非正覺豈能識其趣是以群生若之慈像法遺誨不墜惡道拔以幽苦於是闡提含生同悟可尋苦空難寄審世非常咸後山海非輕能所竭有維那王二郎綰率法義三百人等信心崇道識鑒淵遠唱情先發積微至廣傾竭使合門眷屬願令從心後以靈鑒化容侍身琴瑟箜篌簫笛鼓樂倒龍花琰備如詳目願使天下義諸人并家眷屬剋唱萇年常以佛會面奉聖顏彌勒下生願登上首法義兄弟題名刊石青州北海郡都昌縣方山東新王村凡法義有三百人等敬造石像碑銘陽珍比丘僧梵比丘僧玉王文秀高阿怨王文憘劉普愛賈承伯王芷仁王祖貴王景達孫景比丘道最維那主王二郎高阿智賈伯苻高阿興高榮世王普勝趙觀連王阿仲賈難僧王承休比丘僧哲維那主賈柱王秀和王阿愛賈劉宗劉終愛扈蓋族王市買郭阿槫尹清瓽王景辰比丘僧法生維那主王承民成公鍾葵王文貴王蓋宗王天興扈道安王文龍王領孫扈徽遠王倉比丘僧常維那主王見憘王天安賈覓底高牛奴高苟仁王宗貴王阿劉阿鍾王顯貴高僧比丘僧遠陽思祖扈承化賈奉仙高金安王祖興賈長孫王冀周高景徽楊阿清趙白比丘僧道微王天念高阿慶王文達高阿林高羽生王阿參高蘭生劉暈王終王鳳比丘尼法現比丘尼靜振比丘尼靜專維那主楊憐華李阿瓖尹桃英張姬賈伏香鞠貴姜周登比丘尼法能比丘尼靜顒比丘尼靜華維那主過雙英劉雙姜王同姬王武勝朱伏光張杏頭高比丘尼靜姜比丘尼智靜比丘尼法維那主趙妃姜劉界姜傅英姬王金花孟力姜馬伏姬姚比丘尼靜歸比丘尼法顯比丘尼談隱維那主劉明陵謝亂姜尹雲姜楊素姬王文香徐妃姜藺比丘尼靜明比丘尼法勝比丘尼靜炎維那主談逍遙汲亂姜時妙姜高屋夷姚玉陵宋寄姜楊比丘尼僧潤比丘尼法興比丘尼僧謙維那主董落姜王敕勤李梨姬解顏女潘明陵淳于男白比丘尼法僧比丘尼靜憐比丘尼靜超維那主柳噉鬼管男生王憘女宋文香劉足姬王姜女劉比丘尼智會比丘尼法好比丘尼靜曜維那主宋英姬賀萇生王二王鄭姜劉姜潘姜比丘尼僧研比丘尼法通比丘尼僧仙維那主楊阿憐管梟女史羅姜金珠賈貴賈盡金比丘尼僧比丘尼法妃比丘尼靜遠韓花女孫雙姜賈王妙姜比丘比丘尼
